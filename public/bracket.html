<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cuadro del torneo — Quiniela del Tri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --pitch:#163B2C; --pitch-deep:#0E2A20; --chalk:#F6F3EA; --gold:#C9962E; --rojo:#B5342A; --line: rgba(246,243,234,0.18); --verdeok:#3FB65F; }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Inter',sans-serif; background:var(--pitch-deep); color:var(--chalk); min-height:100vh; padding:28px 14px 60px; }
  .flag-strip{ height:6px; display:flex; max-width:1300px; margin:0 auto 18px; }
  .flag-strip span{ flex:1; }
  .flag-strip .g{ background:#0B6623; } .flag-strip .w{ background:#F6F3EA; } .flag-strip .r{ background:#C8102E; }
  .top{ max-width:1300px; margin:0 auto 22px; display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:10px; }
  .eyebrow{ font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--gold); margin:0 0 6px; }
  h1{ font-family:'Oswald',sans-serif; font-weight:700; font-size:26px; text-transform:uppercase; margin:0; }
  a.back{ font-family:'Space Mono',monospace; font-size:11.5px; color:var(--gold); text-decoration:none; }
  .scrollarea{ max-width:1300px; margin:0 auto; overflow-x:auto; padding-bottom:10px; }
  .bracket{ display:flex; gap:18px; min-width:1180px; align-items:stretch; }
  .col{ display:flex; flex-direction:column; justify-content:space-around; gap:10px; flex:1; min-width:140px; }
  .col-title{ font-family:'Space Mono',monospace; font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--gold); text-align:center; margin-bottom:6px; font-weight:700; }
  .match{ background:var(--pitch); border:1px solid var(--line); border-radius:8px; padding:7px 9px; font-size:12px; }
  .slot{ display:flex; justify-content:space-between; align-items:center; padding:3px 2px; border-radius:4px; gap:6px; }
  .slot.win{ color:var(--chalk); font-weight:700; }
  .slot.lose{ color:rgba(246,243,234,0.32); text-decoration:line-through; }
  .slot.tbd{ color:rgba(246,243,234,0.3); font-style:italic; }
  .slot .nm{ font-family:'Oswald',sans-serif; font-size:12px; }
  .slot .ow{ font-family:'Space Mono',monospace; font-size:8.5px; color:rgba(246,243,234,0.45); margin-top:1px; }
  .check{ color:var(--verdeok); font-weight:900; font-size:13px; flex-shrink:0; }
  .vline{ border-top:1px dashed var(--line); margin:3px 0; }
  .center-col{ align-items:center; justify-content:center; gap:14px; min-width:170px; }
  .final-box{ background:var(--gold); border-radius:8px; padding:10px 12px; width:100%; text-align:left; }
  .final-box .ttl{ font-family:'Oswald',sans-serif; font-weight:700; font-size:12px; color:var(--pitch-deep); text-transform:uppercase; margin-bottom:6px; }
  .final-box .slot{ background:rgba(14,42,32,0.12); margin-bottom:3px; border-radius:5px; padding:5px 8px; }
  .final-box .slot .nm{ color:var(--pitch-deep); }
  .final-box .slot.lose{ color:rgba(14,42,32,0.4); }
  .third-box{ background:var(--rojo); border-radius:8px; padding:10px 12px; width:100%; text-align:left; }
  .third-box .ttl{ font-family:'Oswald',sans-serif; font-weight:700; font-size:12px; color:var(--chalk); text-transform:uppercase; margin-bottom:6px; }
  .third-box .slot{ background:rgba(0,0,0,0.15); margin-bottom:3px; border-radius:5px; padding:5px 8px; }
  .third-box .slot .nm{ color:var(--chalk); }
  .champion-mini{ background:linear-gradient(135deg, rgba(201,150,46,0.25), rgba(201,150,46,0.06)); border:1px solid var(--gold); border-radius:8px; padding:10px 12px; text-align:center; width:100%; }
  .champion-mini .nm{ font-family:'Oswald',sans-serif; font-size:13px; color:var(--gold); }
  footer{ text-align:center; margin-top:30px; font-family:'Space Mono',monospace; font-size:10.5px; color:rgba(246,243,234,0.3); }
  footer a{ color:var(--gold); text-decoration:none; }
  .pot-pill{ font-family:'Space Mono',monospace; font-size:11px; background:rgba(201,150,46,0.16); color:var(--gold); padding:4px 10px; border-radius:20px; }
</style>
</head>
<body>
<div class="flag-strip"><span class="g"></span><span class="w"></span><span class="r"></span></div>
<div class="top">
  <div>
    <p class="eyebrow">🇲🇽 Mundial 2026</p>
    <h1>Cuadro del torneo (desde Octavos)</h1>
  </div>
  <div style="text-align:right;">
    <span class="pot-pill" id="potPill">bote: …</span><br>
    <a class="back" href="/" style="margin-top:6px; display:inline-block;">← volver a la quiniela</a>
  </div>
</div>

<div class="scrollarea">
  <div class="bracket" id="bracketWrap">
    <p style="color:rgba(246,243,234,0.5); font-family:'Space Mono',monospace; font-size:12px;">Cargando cuadro…</p>
  </div>
</div>

<footer>Se actualiza solo conforme el organizador registra los resultados reales.</footer>

<script>
const ROUND_LEVELS = {
  "Octavos": 0,
  "Eliminado en Octavos": 0,
  "Avanzó a Cuartos": 1,
  "Eliminado en Cuartos": 1,
  "Avanzó a Semifinal": 2,
  "Jugó el partido por el 3er lugar": 2,
  "Jugó la Final": 3,
  "Subcampeón": 3,
  "4to lugar": 2,
  "Campeón": 4,
  "3er lugar": 3
};

function wins(team){ return team ? (ROUND_LEVELS[team.status] ?? 0) : -1; }

function representative(group, requiredWins){
  let best = null, bestWins = -1, tie = false;
  group.filter(Boolean).forEach(t => {
    const w = wins(t);
    if (w > bestWins){ bestWins = w; best = t; tie = false; }
    else if (w === bestWins && w >= 0){ tie = true; }
  });
  if (bestWins < requiredWins || tie) return null;
  return best;
}

function slotHtml(team, levelNeeded){
  if(!team){
    return `<div class="slot tbd"><span class="nm">por definir</span></div>`;
  }
  const w = wins(team);
  const isLoser = team.status && (team.status.startsWith('Eliminado') || team.status === '4to lugar' || team.status === 'Subcampeón');
  const isWinner = w >= levelNeeded && !isLoser;
  const cls = isLoser ? 'lose' : (isWinner ? 'win' : '');
  const ownerHtml = team.owner ? `<div class="ow">${team.owner}</div>` : '';
  const check = isWinner ? `<span class="check">✓</span>` : '';
  return `<div class="slot ${cls}"><div><div class="nm">${team.name}</div>${ownerHtml}</div>${check}</div>`;
}

function matchBox(a, b, levelNeeded){
  return `<div class="match">${slotHtml(a, levelNeeded)}<div class="vline"></div>${slotHtml(b, levelNeeded)}</div>`;
}

function col(title, innerHtml, extraClass){
  return `<div class="col ${extraClass||''}"><div class="col-title">${title}</div>${innerHtml}</div>`;
}

async function load(){
  try{
    const res = await fetch('/api/teams');
    const data = await res.json();
    document.getElementById('potPill').textContent = `bote: $${data.summary.pot.toLocaleString('es-MX')}`;
    renderBracket(data.teams);
  }catch(e){
    document.getElementById('bracketWrap').innerHTML = '<p style="color:#E2918A;">No se pudo cargar el cuadro.</p>';
  }
}

function renderBracket(teamsRaw){
  const teams = teamsRaw.slice().sort((a,b) => (a.bracketPos ?? a.id) - (b.bracketPos ?? b.id));

  // 16 equipos -> 8 pares de octavos
  const r16Pairs = [];
  for(let i=0;i<teams.length;i+=2) r16Pairs.push([teams[i], teams[i+1]]);
  const r16Winners = r16Pairs.map(p => representative(p, 1));

  // cuartos: grupos de 4 equipos originales
  const qfGroups = [];
  for(let i=0;i<r16Pairs.length;i+=2) qfGroups.push([...r16Pairs[i], ...r16Pairs[i+1]]);
  const qfWinners = qfGroups.map(g => representative(g, 2));

  // mitad izquierda = pares 0-3 (8 equipos) / mitad derecha = pares 4-7
  const L = { r16: r16Pairs.slice(0,4), r16W: r16Winners.slice(0,4), qfW: qfWinners.slice(0,2) };
  const R = { r16: r16Pairs.slice(4,8), r16W: r16Winners.slice(4,8), qfW: qfWinners.slice(2,4) };

  const finalistLeft = representative(L.qfW, 3);
  const finalistRight = representative(R.qfW, 3);

  const campeon = teams.find(t => t.status === 'Campeón');
  const tercero = teams.find(t => t.status === '3er lugar');
  const cuarto = teams.find(t => t.status === '4to lugar');

  function buildSide(side){
    const c8 = side.r16.map(p => matchBox(p[0], p[1], 1)).join('');
    const c4arr = [];
    for(let i=0;i<side.r16W.length;i+=2) c4arr.push(matchBox(side.r16W[i], side.r16W[i+1], 2));
    const cSemi = matchBox(side.qfW[0], side.qfW[1], 3);
    return { c8, c4: c4arr.join(''), cSemi };
  }

  const left = buildSide(L);
  const right = buildSide(R);

  let html = '';
  html += col('Octavos', left.c8);
  html += col('Cuartos', left.c4);
  html += col('Semis', left.cSemi);

  html += `<div class="col center-col">
      <div class="col-title">Final</div>
      <div class="final-box">
        <div class="ttl">🏆 Final</div>
        ${slotHtml(finalistLeft, 4)}
        ${slotHtml(finalistRight, 4)}
      </div>
      <div class="third-box">
        <div class="ttl">3er puesto</div>
        ${slotHtml(tercero, 4)}
        ${slotHtml(cuarto, 4)}
      </div>
      <div class="champion-mini">
        <div class="nm">${campeon ? '🏆 ' + campeon.name + (campeon.owner ? ' · ' + campeon.owner : '') : 'Campeón: por definir'}</div>
      </div>
    </div>`;

  html += col('Semis', right.cSemi);
  html += col('Cuartos', right.c4);
  html += col('Octavos', right.c8);

  document.getElementById('bracketWrap').innerHTML = html;
}

load();
</script>
</body>
</html>
